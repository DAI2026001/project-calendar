      <title>投标日程日历</title>
    <style>
      :root {
        --bg: #f6f2e9;
        --panel: rgba(255, 251, 245, 0.88);
        --panel-strong: #fffdf8;
        --ink: #1d2430;
        --muted: #647083;
        --line: rgba(25, 38, 56, 0.1);
        --brand: #b6452c;
        --brand-soft: rgba(182, 69, 44, 0.12);
        --accent: #1f6b5c;
        --shadow: 0 20px 45px rgba(74, 56, 29, 0.12);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(182, 69, 44, 0.15), transparent 28%),
          radial-gradient(circle at top right, rgba(31, 107, 92, 0.18), transparent 24%),
          linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
        color: var(--ink);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(29, 36, 48, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(29, 36, 48, 0.03) 1px, transparent 1px);
        background-size: 18px 18px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.55), transparent 80%);
      }

      .app {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 12px 0 28px;
      }

      .calendar-shell,
      .agenda-shell {
        background: var(--panel);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 10px;
      }

      .search {
        flex: 1 1 280px;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        border-radius: 14px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        box-shadow: 0 10px 24px rgba(74, 56, 29, 0.05);
      }

      .search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        padding: 12px 0;
        font-size: 15px;
        color: var(--ink);
      }

      .month-chips {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .month-chips button,
      .nav button,
      .calendar-day button {
        appearance: none;
        border: 0;
        cursor: pointer;
      }

      .month-chips button {
        white-space: nowrap;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-weight: 700;
        font-size: 13px;
        border: 1px solid rgba(25, 38, 56, 0.06);
      }

      .month-chips button.active {
        background: var(--brand);
        color: #fff;
        box-shadow: 0 12px 24px rgba(182, 69, 44, 0.22);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.12fr) minmax(320px, 0.88fr);
        gap: 14px;
      }

      .view-switch {
        display: none;
        gap: 8px;
        margin-bottom: 10px;
      }

      .view-switch button {
        flex: 1;
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
      }

      .view-switch button.active {
        background: var(--ink);
        color: #fff;
        box-shadow: 0 10px 20px rgba(29, 36, 48, 0.16);
      }

      .calendar-shell,
      .agenda-shell {
        padding: 16px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .nav strong {
        font-size: 22px;
      }

      .nav span {
        color: var(--muted);
        font-size: 14px;
      }

      .nav-actions {
        display: flex;
        gap: 8px;
      }

      .nav button {
        min-width: 76px;
        height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
      }

      .weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .weekdays {
        margin-bottom: 6px;
      }

      .weekdays span {
        padding: 10px 6px;
        text-align: center;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
      }

      .calendar-grid {
        gap: 6px;
      }

      .calendar-day {
        min-height: 88px;
      }

      .calendar-day button,
      .calendar-day.empty {
        width: 100%;
        height: 100%;
        min-height: 88px;
        border-radius: 18px;
        background: var(--panel-strong);
        border: 1px solid rgba(25, 38, 56, 0.06);
        padding: 10px 10px;
        text-align: left;
      }

      .calendar-day.empty {
        opacity: 0.25;
      }

      .calendar-day button.is-outside {
        opacity: 0.46;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(244, 240, 233, 0.78));
      }

      .calendar-day button.has-items {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 243, 239, 0.95));
      }

      .calendar-day button.selected {
        border-color: rgba(182, 69, 44, 0.45);
        box-shadow: 0 10px 22px rgba(182, 69, 44, 0.16);
      }

      .day-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .day-top strong {
        font-size: 15px;
      }

      .count-pill {
        min-width: 28px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--brand-soft);
        color: var(--brand);
        text-align: center;
        font-size: 12px;
        font-weight: 700;
      }

      .day-badges {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        flex-wrap: wrap;
      }

      .day-flag {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1.2;
      }

      .day-flag.holiday {
        background: linear-gradient(180deg, rgba(159, 47, 53, 0.12), rgba(159, 47, 53, 0.06));
        color: #9f2f35;
        border: 1px solid rgba(159, 47, 53, 0.12);
      }

      .calendar-day button.is-weekend strong {
        color: #7d6a52;
      }

      .calendar-day button.is-holiday strong {
        color: #9f2f35;
      }

      .day-snippet {
        margin-top: 8px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }

      .day-markers {
        display: flex;
        gap: 6px;
        margin-top: 6px;
        flex-wrap: wrap;
      }

      .day-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .agenda-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .agenda-head h2 {
        margin: 0 0 4px;
        font-size: 24px;
      }

      .agenda-head p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .agenda-list {
        display: grid;
        gap: 10px;
      }

      .card {
        background: var(--panel-strong);
        border: 1px solid rgba(25, 38, 56, 0.08);
        border-radius: 18px;
        padding: 15px;
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .card-main {
        flex: 1;
        min-width: 0;
      }

      .time-badge {
        flex: none;
        padding: 6px 10px;
        border-radius: 12px;
        background: rgba(31, 107, 92, 0.12);
        color: var(--accent);
        font-size: 11px;
        font-weight: 800;
        margin-left: 12px;
      }

      .region-tag {
        display: inline-flex;
        margin-bottom: 6px;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(31, 107, 92, 0.1);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
      }

      .sheet-tag {
        display: inline-flex;
        margin-left: 8px;
        padding: 5px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }

      .sheet-tag.sheet-both,
      .day-dot.sheet-both {
        background: #1f8a5b;
        color: #fff;
      }

      .sheet-tag.sheet-water,
      .day-dot.sheet-water {
        background: #1d7ca4;
        color: #fff;
      }

      .sheet-tag.sheet-fuzhu,
      .day-dot.sheet-fuzhu {
        background: #8b5cf6;
        color: #fff;
      }

      .sheet-tag.sheet-huiyang,
      .day-dot.sheet-huiyang {
        background: #9f2f35;
        color: #fff;
      }

      .card h3 {
        margin: 0;
        font-size: 17px;
        line-height: 1.48;
        letter-spacing: 0.01em;
        word-break: break-word;
      }

      .core-brief {
        margin-top: 10px;
        padding: 11px 13px;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(250, 242, 236, 0.92), rgba(255, 252, 248, 0.96));
        border: 1px solid rgba(182, 69, 44, 0.1);
        color: #694a38;
        line-height: 1.6;
        font-size: 13px;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .mini-tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 9px;
        border-radius: 999px;
        background: rgba(31, 107, 92, 0.08);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
      }

      .empty-state {
        padding: 28px 16px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

      }

      @media (max-width: 600px) {
        .app {
          width: min(100% - 20px, 100%);
          padding-top: 10px;
        }

        .calendar-shell,
        .agenda-shell {
          border-radius: 22px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .calendar-grid {
          gap: 6px;
        }

        .view-switch {
          display: flex;
        }

        .layout {
          gap: 12px;
        }

        .calendar-day,
        .calendar-day button,
        .calendar-day.empty {
          min-height: 78px;
        }

        .card-head {
          flex-direction: column;
        }

        .time-badge {
          margin-left: 0;
        }

        .calendar-shell[data-mobile-hidden="true"],
        .agenda-shell[data-mobile-hidden="true"] {
          display: none;
        }

        .toolbar {
          margin: 0 0 12px;
        }

        .search input {
          font-size: 16px;
        }

        .month-chips button {
          padding: 9px 12px;
          font-size: 12px;
        }

        .calendar-shell,
        .agenda-shell {
          padding: 12px;
        }

        .nav strong,
        .agenda-head h2 {
          font-size: 20px;
        }

        .nav {
          align-items: flex-start;
        }

        .nav-actions {
          width: 100%;
          justify-content: flex-end;
        }

        .nav button {
          min-width: 76px;
          height: 38px;
          padding: 0 12px;
          font-size: 13px;
        }

        .card {
          padding: 14px;
        }

        .card h3 {
          font-size: 16px;
          line-height: 1.5;
        }

        .time-badge {
          font-size: 13px;
        }

        .core-brief {
          padding: 10px 12px;
          font-size: 12px;
        }
      }
    </style>
  </head>

        </aside>
      </section>
    </main>

"09:00","amount":"14347342","amountWan":"1434.73","qualification":"市政三级","evaluation":"经评审低价B","deposit":"200000","staff":"市政二级、中工","kValue":"8-12%","billCount":"215","danger":"有","confinedSpace":"/","signup":"已完成","sourceTag":"两家"},{"id":"259","workbookTag":"辉阳,富竹","sheetName":"投标项目市政房建 / 富竹项目","sheetTag":"市政房建","region":"福州","name":"福州市长乐区城乡供水一体化工程一期项目（乡镇配水工程）梅花镇二标段（施工）","datetime":"9999-12-31T23:59","dateLabel":"待定","dayKey":"待定","timeLabel":"待定","amount":"23791336","amountWan":"2379.13","qualification":"市政三级","evaluation":"经评审低价A","deposit":"470000","staff":"市政二级、中工","kValue":"8-12%","billCount":"94","danger":"有","confinedSpace":"/","signup":"已完成","sourceTag":"两家"},{"id":"138","workbookTag":"辉阳","sheetName":"投标项目市政房建","sheetTag":"市政房建","region":"莆田","name":"莆田学院附属医院肿瘤防治综合大楼(施工)","datetime":"9999-12-31T23:59","dateLabel":"待定08:30:00","dayKey":"待定","timeLabel":"08:30:00","amount":"212323663","amountWan":"21232.37","qualification":"建筑二级","evaluation":"经评审低价B","deposit":"800000","staff":"建筑一级、中工","kValue":"6-10%","billCount":"10275","danger":"有","confinedSpace":"/","signup":"已完成","sourceTag":"辉阳"}];

    <script>
      const projects = Array.isArray(window.SCHEDULE_DATA) ? window.SCHEDULE_DATA : [];
      const searchInput = document.getElementById("searchInput");
      const monthChipsEl = document.getElementById("monthChips");
      const calendarTitleEl = document.getElementById("calendarTitle");
      const calendarSubtitleEl = document.getElementById("calendarSubtitle");
      const calendarActionsEl = document.getElementById("calendarActions");
      const calendarGridEl = document.getElementById("calendarGrid");
      const agendaTitleEl = document.getElementById("agendaTitle");
      const agendaSubtitleEl = document.getElementById("agendaSubtitle");
      const agendaListEl = document.getElementById("agendaList");
      const viewSwitchEl = document.getElementById("viewSwitch");
      const calendarShellEl = document.getElementById("calendarShell");
      const agendaShellEl = document.getElementById("agendaShell");

      const datedProjects = projects.filter((item) => item.dayKey !== "待定");
      const monthKeys = [...new Set(datedProjects.map((item) => item.dayKey.slice(0, 7)))].sort((a, b) =>
        b.localeCompare(a)
      );
      const hasPending = projects.some((item) => item.dayKey === "待定");
      if (hasPending) monthKeys.push("待定");

      const todayMonth = new Date().toISOString().slice(0, 7);
      const initialMonth = monthKeys.includes(todayMonth) ? todayMonth : monthKeys[0];

      const state = {
        search: "",
        month: initialMonth,
        selectedDay: initialMonth === "待定" ? "待定" : null,
        mobileView: "agenda",
      };
      const HOLIDAY_MAP = {
        "2025-01-01": "元旦",
        "2025-01-28": "春节",
        "2025-01-29": "春节",
        "2025-01-30": "春节",
        "2025-01-31": "春节",
        "2025-02-01": "春节",
        "2025-02-02": "春节",
        "2025-02-03": "春节",
        "2025-02-04": "春节",
        "2025-04-04": "清明",
        "2025-04-05": "清明",
        "2025-04-06": "清明",
        "2025-05-01": "劳动节",
        "2025-05-02": "劳动节",
        "2025-05-03": "劳动节",
        "2025-05-04": "劳动节",
        "2025-05-05": "劳动节",
        "2025-05-31": "端午",
        "2025-06-01": "端午",
        "2025-06-02": "端午",
        "2025-10-01": "国庆",
        "2025-10-02": "国庆",
        "2025-10-03": "国庆",
        "2025-10-04": "国庆",
        "2025-10-05": "国庆",
        "2025-10-06": "国庆",
        "2025-10-07": "国庆",
        "2025-10-08": "中秋",
        "2026-01-01": "元旦",
        "2026-01-02": "元旦",
        "2026-01-03": "元旦",
        "2026-02-15": "春节",
        "2026-02-16": "春节",
        "2026-02-17": "春节",
        "2026-02-18": "春节",
        "2026-02-19": "春节",
        "2026-02-20": "春节",
        "2026-02-21": "春节",
        "2026-02-22": "春节",
        "2026-02-23": "春节",
        "2026-04-04": "清明",
        "2026-04-05": "清明",
        "2026-04-06": "清明",
        "2026-05-01": "劳动节",
        "2026-05-02": "劳动节",
        "2026-05-03": "劳动节",
        "2026-05-04": "劳动节",
        "2026-05-05": "劳动节",
        "2026-06-19": "端午",
        "2026-06-20": "端午",
        "2026-06-21": "端午",
        "2026-09-25": "中秋",
        "2026-09-26": "中秋",
        "2026-09-27": "中秋",
        "2026-10-01": "国庆",
        "2026-10-02": "国庆",
        "2026-10-03": "国庆",
        "2026-10-04": "国庆",
        "2026-10-05": "国庆",
        "2026-10-06": "国庆",
        "2026-10-07": "国庆",
      };

      function isMobile() {
        return window.matchMedia("(max-width: 600px)").matches;
      }

      function formatMoney(value) {
        if (!value || value === "/") return "未填写";
        return Number(value).toLocaleString("zh-CN");
      }

      function formatAmount(project) {
        if (!project.amount) return "未填写";
        if (project.amountWan) {
          return `${Number(project.amount).toLocaleString("zh-CN")} 元 / ${project.amountWan} 万`;
        }
        return `${formatMoney(project.amount)} 元`;
      }

      function formatMonthLabel(monthKey, count) {
        if (monthKey === "待定") {
          return `待定项目｜${count}`;
        }
        const [year, month] = monthKey.split("-");
        const shortYear = year.slice(2);
        return `${shortYear}年${Number(month)}月｜项目${count}`;
      }

      function formatMonthTitle(monthKey) {
        if (monthKey === "待定") {
          return "待定项目";
        }
        const [year, month] = monthKey.split("-");
        return `${year}年${Number(month)}月`;
      }

      function getMonthProjects(monthKey) {
        if (monthKey === "待定") {
          return projects.filter((item) => item.dayKey === "待定");
        }
        return datedProjects.filter((item) => item.dayKey.startsWith(monthKey));
      }

      function getFilteredProjects() {
        const keyword = state.search.trim().toLowerCase();
        const source = getMonthProjects(state.month);
        if (!keyword) return source;
        return source.filter((item) =>
          [item.name, item.region, item.qualification, item.kValue, item.staff]
            .join(" ")
            .toLowerCase()
            .includes(keyword)
        );
      }

      function getSearchMatchedDatedProjects() {
        const keyword = state.search.trim().toLowerCase();
        if (!keyword) return datedProjects;
        return datedProjects.filter((item) =>
          [item.name, item.region, item.qualification, item.kValue, item.staff]
            .join(" ")
            .toLowerCase()
            .includes(keyword)
        );
      }

      function getFirstDayWithProjects(items) {
        const first = items.find((item) => item.dayKey !== "待定");
        return first ? first.dayKey : null;
      }

      function renderMonthChips() {
        monthChipsEl.innerHTML = monthKeys
          .map((monthKey) => {
            const count = getMonthProjects(monthKey).length;
            const label = formatMonthLabel(monthKey, count);
            return `<button class="${state.month === monthKey ? "active" : ""}" data-month="${monthKey}">${label}</button>`;
          })
          .join("");

        [...monthChipsEl.querySelectorAll("button")].forEach((button) => {
          button.addEventListener("click", () => {
            state.month = button.dataset.month;
            state.selectedDay = state.month === "待定" ? "待定" : getFirstDayWithProjects(getFilteredProjects());
            render();
          });
        });
      }

      function renderCalendarNav() {
        if (state.month === "待定") {
          calendarTitleEl.textContent = "待定项目";
          calendarSubtitleEl.textContent = "这些项目没有明确开标日期，已按原表内容保留。";
          calendarActionsEl.innerHTML = "";
          return;
        }

        const index = monthKeys.indexOf(state.month);
        const prev = monthKeys[index - 1];
        const next = monthKeys[index + 1] === "待定" ? null : monthKeys[index + 1];

        calendarTitleEl.textContent = formatMonthTitle(state.month);
        calendarSubtitleEl.textContent = `共 ${getFilteredProjects().length} 个匹配项目`;
        calendarActionsEl.innerHTML = `
          <button ${next ? `data-nav="${next}"` : "disabled"} aria-label="上一月">上一月</button>
          <button ${prev ? `data-nav="${prev}"` : "disabled"} aria-label="下一月">下一月</button>
        `;

        [...calendarActionsEl.querySelectorAll("button[data-nav]")].forEach((button) => {
          button.addEventListener("click", () => {
            state.month = button.dataset.nav;
            state.selectedDay = getFirstDayWithProjects(getFilteredProjects());
            render();
          });
        });
      }

      function renderCalendar() {
        renderCalendarNav();

        if (state.month === "待定") {
          calendarGridEl.innerHTML = '<div class="empty-state">待定项目不进入月历网格，请在右侧列表查看。</div>';
          return;
        }

        const filteredProjects = getFilteredProjects();
        const searchMatchedProjects = getSearchMatchedDatedProjects();
        const projectMap = new Map();
        searchMatchedProjects.forEach((item) => {
          const list = projectMap.get(item.dayKey) || [];
          list.push(item);
          projectMap.set(item.dayKey, list);
        });

        const [year, month] = state.month.split("-").map(Number);
        const firstDay = new Date(year, month - 1, 1);
        const daysInMonth = new Date(year, month, 0).getDate();
        const offset = (firstDay.getDay() + 6) % 7;
        const leadingStart = new Date(year, month - 1, 1 - offset);
        const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;

        const cells = [];
        for (let i = 0; i < totalCells; i += 1) {
          const currentDate = new Date(leadingStart);
          currentDate.setDate(leadingStart.getDate() + i);
          const currentMonthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}`;
          const dayKey = `${currentMonthKey}-${String(currentDate.getDate()).padStart(2, "0")}`;
          const list = projectMap.get(dayKey) || [];
          const isOutside = currentMonthKey !== state.month;
          const weekday = currentDate.getDay();
          const isWeekend = weekday === 0 || weekday === 6;
          const holidayLabel = HOLIDAY_MAP[dayKey] || "";
          const selected = state.selectedDay ? state.selectedDay === dayKey : false;
          const summary = list[0] ? `${list[0].timeLabel} ${list[0].region}` : "暂无项目";
          cells.push(`
            <div class="calendar-day">
              <button
                class="${list.length ? "has-items" : ""} ${selected ? "selected" : ""} ${isOutside ? "is-outside" : ""} ${isWeekend ? "is-weekend" : ""} ${holidayLabel ? "is-holiday" : ""}"
                data-day="${dayKey}"
              >
                <div class="day-top">
                  <strong>${currentDate.getDate()}</strong>
                  <div class="day-badges">
                    ${holidayLabel ? `<span class="day-flag holiday">${holidayLabel}</span>` : ""}
                    ${list.length ? `<span class="count-pill">${list.length}</span>` : ""}
                  </div>
                </div>
                <div class="day-snippet">${summary}</div>
                ${
                  list.length
                    ? `<div class="day-markers">${renderDayMarkers(list)}</div>`
                    : ""
                }
              </button>
            </div>
          `);
        }

        calendarGridEl.innerHTML = cells.join("");
        [...calendarGridEl.querySelectorAll("button[data-day]")].forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedDay = button.dataset.day;
            renderAgenda();
            renderCalendar();
          });
        });
      }

      function createCard(project) {
        const coreBrief = [
          project.qualification || "资质未填写",
          project.amountWan ? `控制价 ${project.amountWan} 万` : "控制价未填写",
          project.kValue ? `K值 ${project.kValue}` : "K值未填写",
        ].join(" · ");

        return `
          <article class="card">
            <div class="card-head">
              <div class="card-main">
                <span class="region-tag">${project.region || "未分地区"}</span>
                <span class="sheet-tag ${getSheetClass(project)}">${project.sourceTag || project.sheetTag || project.sheetName || "项目"}</span>
                <h3>${project.name}</h3>
              </div>
              <span class="time-badge">${project.dateLabel}</span>
            </div>
            <div class="core-brief">${coreBrief}</div>
            <div class="tag-row">
              <span class="mini-tag">${project.evaluation || "评标办法未填写"}</span>
              <span class="mini-tag">${project.staff || "人员要求未填写"}</span>
              <span class="mini-tag">${project.signup || "报名状态未填写"}</span>
            </div>
          </article>
        `;
      }

      function renderAgenda() {
        const filteredProjects = getFilteredProjects();
        const searchMatchedProjects = getSearchMatchedDatedProjects();
        let list = filteredProjects;
        let title = state.month === "待定" ? "待定项目" : `${state.month} 全部项目`;
        let subtitle = `共 ${filteredProjects.length} 个匹配项目`;

        if (state.month !== "待定" && state.selectedDay) {
          const source = state.selectedDay.startsWith(state.month)
            ? filteredProjects
            : searchMatchedProjects;
          list = source.filter((item) => item.dayKey === state.selectedDay);
          title = state.selectedDay;
          subtitle = list.length
            ? `当天共有 ${list.length} 个项目开标`
            : "这一天没有匹配当前搜索条件的项目";
        }

        agendaTitleEl.textContent = title;
        agendaSubtitleEl.textContent = subtitle;
        agendaListEl.innerHTML = list.length
          ? list.map(createCard).join("")
          : '<div class="empty-state">没有找到匹配的项目，试试切换月份或修改搜索关键词。</div>';
      }

      function getSheetClass(project) {
        if (project.sourceTag === "两家") return "sheet-both";
        if (project.sourceTag === "富竹") return "sheet-fuzhu";
        if (project.sourceTag === "辉阳") return "sheet-huiyang";
        return "sheet-water";
      }

      function renderDayMarkers(list) {
        const tags = [];
        if (list.some((item) => item.sourceTag === "两家")) {
          tags.push('<span class="day-dot sheet-both" title="两家"></span>');
        }
        if (list.some((item) => item.sourceTag === "辉阳")) {
          tags.push('<span class="day-dot sheet-huiyang" title="辉阳"></span>');
        }
        if (list.some((item) => item.sourceTag === "富竹")) {
          tags.push('<span class="day-dot sheet-fuzhu" title="富竹"></span>');
        }
        if (list.some((item) => item.sourceTag === "水利")) {
          tags.push('<span class="day-dot sheet-water" title="水利"></span>');
        }
        return tags.join("");
      }

      function renderViewSwitch() {
        if (!isMobile()) {
          calendarShellEl.removeAttribute("data-mobile-hidden");
          agendaShellEl.removeAttribute("data-mobile-hidden");
          return;
        }

        [...viewSwitchEl.querySelectorAll("button")].forEach((button) => {
          button.classList.toggle("active", button.dataset.view === state.mobileView);
        });

        calendarShellEl.setAttribute("data-mobile-hidden", state.mobileView !== "calendar");
        agendaShellEl.setAttribute("data-mobile-hidden", state.mobileView !== "agenda");
      }

      function render() {
        renderMonthChips();
        renderCalendar();
        renderAgenda();
        renderViewSwitch();
      }

      searchInput.addEventListener("input", (event) => {
        state.search = event.target.value;
        if (state.month !== "待定") {
          state.selectedDay = getFirstDayWithProjects(getFilteredProjects());
        }
        render();
      });

      [...viewSwitchEl.querySelectorAll("button")].forEach((button) => {
        button.addEventListener("click", () => {
          state.mobileView = button.dataset.view;
          renderViewSwitch();
        });
      });

      window.addEventListener("resize", renderViewSwitch);

      if (state.month !== "待定") {
        state.selectedDay = getFirstDayWithProjects(getFilteredProjects());
      }
      render();
    </script>
